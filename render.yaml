services:
  - type: web
    name: prestige-rentals
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SITE_NAME
        value: Prestige Rentals
      - key: DATABASE_URL
        fromDatabase:
          name: prestige-rentals-db
          property: connectionString
      - key: NEXT_PUBLIC_BUSINESS_PHONE
        sync: false
      - key: ADMIN_PASSWORD
        generateValue: false
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: prestige-rentals-db
    databaseName: prestige_rentals
    user: prestige_user
    region: oregon
    plan: free
